<!DOCTYPE html>
<html>
<body>
<h1>Control LED light</h1>
<input id="light" type="checkbox">LED
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.3/socket.io.js"></script>

<script> 
  var socket = io();  
  window.addEventListener("load", function(){  
    var lightbox = document.getElementById("light"); 
    lightbox.addEventListener("change", function() {  
      changes socket.emit("light", Number(this.checked));  
    }); 
  });
  
  socket.on('light', function (data) {  
    document.getElementById("light").checked = data; 
    socket.emit("light", data); 
  }); 
</script>

</body>
</html>
